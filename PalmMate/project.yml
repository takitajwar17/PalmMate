name: PalmMate
options:
  bundleIdPrefix: com.palmmate
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: PalmMate/Config.xcconfig
  Release: PalmMate/Config.xcconfig

targets:
  PalmMate:
    type: application
    platform: iOS
    sources:
      - path: PalmMate
        excludes:
          - "Assets.xcassets"
          - "Config.xcconfig.example"
          - "Config.xcconfig"
    resources:
      - path: PalmMate/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palmmate.app
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        # Reference the Info.plist + entitlements files in place — do NOT use
        # xcodegen's `info:` / `entitlements:` keys, which regenerate (and
        # silently strip) these files on every `xcodegen generate`.
        INFOPLIST_FILE: PalmMate/Info.plist
        CODE_SIGN_ENTITLEMENTS: PalmMate/PalmMate.entitlements
    dependencies: []
