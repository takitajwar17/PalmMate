name = "palmmate-backend"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# R2 bucket for palm photos (created in CF dashboard).
[[r2_buckets]]
binding = "PALMS"
bucket_name = "palmmate-palms"

# KV namespace for invite metadata.
[[kv_namespaces]]
binding = "INVITES"
id = "REPLACE_WITH_KV_ID"

# Secrets — set via `wrangler secret put`:
#   OPENAI_API_KEY
#   APPLE_BUNDLE_ID    e.g. "com.palmmate.app"
